[Device]
name=OnePlus 6

# Match panel heights with the screen's curved area

[Panels][Top]
statusBarHeight=80
leftPadding=12
rightPadding=12
centerSpacing=64

[Panels][Left]
statusBarHeight=80
leftPadding=12
rightPadding=12

[Panels][Right]
statusBarHeight=80
leftPadding=12
rightPadding=12

[Panels][Bottom]
statusBarHeight=80
leftPadding=12
rightPadding=12
